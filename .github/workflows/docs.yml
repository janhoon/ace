name: Docs

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  docs-lint:
    name: Docs (generate + diff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      - name: Generate docs
        run: bash scripts/build-docs.sh --skip-build

      - name: Check generated docs are up to date
        run: |
          if ! git diff --exit-code website/; then
            echo "::error::Generated docs are out of date. Run 'make docs' and commit the result."
            exit 1
          fi

      - name: Build VitePress
        run: bun run build
        working-directory: website

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      - name: Build docs
        run: bash scripts/build-docs.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/.vitepress/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
