apiVersion: v2
name: ace
description: >-
  Ace Observability Platform — unified metrics, logs, and traces powered by
  VictoriaMetrics
type: application
version: 0.12.0
appVersion: 0.12.0
keywords:
  - observability
  - monitoring
  - metrics
  - logs
  - traces
  - victoriametrics
home: https://github.com/aceobservability/ace
sources:
  - https://github.com/aceobservability/ace
maintainers:
  - name: Jan Hoon
    url: https://github.com/aceobservability
annotations:
  artifacthub.io/displayName: Ace Observability Platform
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/aceobservability/ace
  artifacthub.io/containsSecurityUpdates: 'false'
  artifacthub.io/images: |
    - name: ace-backend
      image: ghcr.io/aceobservability/ace-backend
    - name: ace-frontend
      image: ghcr.io/aceobservability/ace-frontend
dependencies:
  - name: postgresql
    version: 16.4.1
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: victoria-metrics-k8s-stack
    version: 0.45.0
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-metrics-k8s-stack.enabled
    alias: vmetrics
  - name: victoria-logs-single
    version: 0.11.28
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-logs-single.enabled
    alias: vlogs
  - name: victoria-metrics-single
    version: 0.18.0
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoriatraces.enabled
    alias: vtraces
