{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: valkey
  labels:
    app.kubernetes.io/name: valkey
spec:
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  labels:
    app.kubernetes.io/name: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
    spec:
      containers:
        - name: valkey
          image: {{ .Values.valkey.image | quote }}
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli ping
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli ping
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
{{- if .Values.valkey.persistence.enabled }}
          persistentVolumeClaim:
            claimName: valkey-data
{{- else }}
          emptyDir: {}
{{- end }}
{{- if .Values.valkey.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valkey-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.valkey.persistence.size | quote }}
{{- end }}
{{- end }}
